name: Check job postings

on:
  schedule:
    - cron: '30 5 * * *'   # 5:30 UTC = 7:30 в Мадриде летом. Поставлено с запасом на типичные задержки GitHub Actions (обычно 9:00-9:30 фактически).
  workflow_dispatch: {}    # позволяет запустить вручную кнопкой на GitHub

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_jobs.py

      - name: Commit updated state
        run: |
          git config user.name "job-bot"
          git config user.email "job-bot@users.noreply.github.com"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "update seen jobs"
          git push
